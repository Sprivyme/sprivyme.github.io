<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>命运 · Destiny — Demo</title>
<style>
  :root{
    --bg:        #050505;
    --panel:     #0d0d0d;
    --panel-2:   #131313;
    --line:      #26241f;
    --ink:       #e9e6de;
    --ink-dim:   #8a877e;
    --spade:     #d9d6cc;   /* attack   */
    --heart:     #e0435c;   /* heal     */
    --diamond:   #d4af37;   /* buff     */
    --club:      #8a5fd1;   /* special  */
    --memory:    #52c3b0;   /* memory card */
    --serif: Georgia, 'Iowan Old Style', 'Times New Roman', serif;
    --mono:  ui-monospace, 'SFMono-Regular', 'Courier New', monospace;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent; -webkit-touch-callout:none;}
  html,body{
    margin:0; padding:0; height:100%; background:var(--bg); color:var(--ink);
    font-family:var(--serif);
    overflow:hidden;
    -webkit-tap-highlight-color:transparent;
  }
  /* 取消移动端默认点击高亮/回调菜单，保留正常点击响应 */
  button, .btn, .card, .album-slot, #screen-story, .story-stage{
    touch-action:manipulation;
    -webkit-user-select:none;
    user-select:none;
    -webkit-tap-highlight-color:transparent;
  }
  #app{position:relative; width:100%; height:100vh; min-height:560px;}

  .screen{
    position:absolute; inset:0; display:none; flex-direction:column;
    align-items:center; justify-content:center;
  }
  .screen.active{display:flex;}

  /* faint vignette atmosphere */
  #app::before{
    content:''; position:absolute; inset:0; pointer-events:none; z-index:5;
    background:radial-gradient(ellipse at 50% 40%, rgba(255,255,255,0.04), rgba(0,0,0,0) 60%),
               radial-gradient(ellipse at 50% 100%, rgba(0,0,0,0.7), rgba(0,0,0,0) 55%);
  }

  /* ---------- TITLE ---------- */
  #screen-title h1{
    font-size:3.2em; letter-spacing:0.35em; font-weight:400; margin:0 0 0.15em 0;
    text-align:center;
  }
  #screen-title .sub{
    color:var(--ink-dim); letter-spacing:0.3em; font-size:0.8em; margin-bottom:3em;
    font-family:var(--mono); text-transform:uppercase;
  }
  .btn{
    background:transparent; color:var(--ink); border:1px solid var(--line);
    padding:0.85em 2.4em; font-family:var(--mono); letter-spacing:0.15em;
    font-size:0.85em; cursor:pointer; transition:all .25s ease; text-transform:uppercase;
  }
  .btn:hover{border-color:var(--ink); background:rgba(255,255,255,0.04);}
  .btn:active{transform:translateY(1px);}
  .btn.primary{color:var(--bg); background:var(--ink); border-color:var(--ink);}
  .btn.primary:hover{background:#fff;}
  .btn:disabled{opacity:0.3; cursor:not-allowed;}
  .btn:disabled:hover{border-color:var(--line); background:transparent;}

  /* ---------- STORY ---------- */
  #screen-story{cursor:pointer;}
  .story-stage{
    position:relative; width:100%; height:100%; display:flex; align-items:flex-end; justify-content:center;
  }
  .story-hint{
    position:absolute; top:8%; left:50%; transform:translateX(-50%);
    color:var(--ink-dim); font-family:var(--mono); font-size:0.75em; letter-spacing:0.2em;
    opacity:0.6;
  }
  .dialogue-box{
    width:min(760px, 88vw); margin-bottom:9vh; padding:1.6em 2em;
    border-top:1px solid var(--line); border-bottom:1px solid var(--line);
    background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(0,0,0,0));
    min-height:120px; position:relative;
  }
  .speaker{
    font-family:var(--mono); letter-spacing:0.25em; font-size:0.78em; color:var(--ink-dim);
    text-transform:uppercase; margin-bottom:0.7em;
  }
  .speaker.is-player{color:var(--ink);}
  .dialogue-text{
    font-size:1.35em; line-height:1.65; min-height:2.4em; font-weight:400;
  }
  .continue-mark{
    position:absolute; right:1.6em; bottom:1.1em; font-family:var(--mono);
    color:var(--ink-dim); font-size:0.8em; animation:blink 1.4s infinite;
  }
  @keyframes blink{0%,100%{opacity:0.15;}50%{opacity:0.9;}}

  /* ---------- TRANSITION (signature element) ---------- */
  #screen-transition{background:var(--bg);}
  .card-flip-wrap{
    perspective:1200px; width:150px; height:220px; position:relative;
  }
  .card-glow{
    position:absolute; inset:-36px; border-radius:50%; pointer-events:none;
    background:radial-gradient(circle, rgba(233,230,222,0.16), rgba(233,230,222,0) 68%);
    opacity:0; transition:opacity .5s ease;
  }
  .card-glow.show{opacity:1;}
  .fate-card{
    width:100%; height:100%; position:relative; transform-style:preserve-3d;
    transform:rotateY(0deg) scale(0.86); will-change:transform;
  }
  .card-side{
    position:absolute; inset:0; border:1px solid var(--line); border-radius:8px;
    display:flex; align-items:center; justify-content:center; backface-visibility:hidden;
    -webkit-backface-visibility:hidden;
  }
  .card-back{
    background:
      repeating-linear-gradient(45deg, #0d0d0d, #0d0d0d 7px, #141310 7px, #141310 14px);
    box-shadow:0 0 40px rgba(255,255,255,0.05);
  }
  .card-back .back-mark{
    font-size:2.6em; color:var(--ink-dim); opacity:0.45; letter-spacing:0.1em;
  }
  .card-front{
    background:var(--panel); transform:rotateY(180deg);
    box-shadow:0 0 50px rgba(255,255,255,0.08);
  }
  .card-front .pip-main{font-size:5em; transition:color .1s linear;}
  .loading-text{
    margin-top:2em; font-family:var(--mono); letter-spacing:0.3em; color:var(--ink-dim);
    font-size:0.85em;
  }

  /* ---------- BATTLE ---------- */
  #screen-battle{justify-content:space-between; padding:2.2vh 0;}
  .enemy-zone{width:100%; display:flex; flex-direction:column; align-items:center; gap:0.6em; padding-top:1vh;}
  .enemy-name{font-family:var(--mono); letter-spacing:0.2em; font-size:0.95em; color:var(--ink-dim);}
  .enemy-sprite{
    width:96px; height:96px; border:1px solid var(--line); border-radius:50%;
    display:flex; align-items:center; justify-content:center; font-size:2.4em;
    box-shadow:0 0 30px rgba(138,95,209,0.12) inset; transition:transform .15s ease;
  }
  .enemy-sprite.hit{animation:shake .35s;}
  @keyframes shake{
    0%,100%{transform:translateX(0);} 25%{transform:translateX(-8px);} 75%{transform:translateX(8px);}
  }
  .hp-bar-wrap{width:220px;}
  .hp-label{display:flex; justify-content:space-between; font-family:var(--mono); font-size:0.72em; color:var(--ink-dim); margin-bottom:3px;}
  .hp-bar{height:6px; background:var(--panel-2); border:1px solid var(--line); overflow:hidden;}
  .hp-fill{height:100%; background:var(--heart); transition:width .35s ease;}
  .hp-fill.player-fill{background:var(--memory);}

  .battle-center{
    flex:1; width:100%; display:flex; align-items:center; justify-content:center; gap:3vw;
    position:relative;
  }
  .status-tags{display:flex; gap:0.5em; flex-wrap:wrap; justify-content:center; max-width:220px;}
  .tag{
    font-family:var(--mono); font-size:0.68em; letter-spacing:0.1em; padding:0.3em 0.6em;
    border:1px solid var(--line); color:var(--ink-dim);
  }
  .log-line{
    position:absolute; top:0; left:50%; transform:translateX(-50%);
    font-family:var(--mono); font-size:0.8em; color:var(--ink-dim); letter-spacing:0.05em;
    white-space:nowrap; opacity:0; transition:opacity .3s ease;
  }
  .log-line.show{opacity:1;}

  .player-zone{width:100%; display:flex; flex-direction:column; align-items:center; gap:1em;}
  .player-stats{
    display:flex; gap:2.4em; align-items:center; font-family:var(--mono); font-size:0.8em; color:var(--ink-dim);
  }
  .ap-dots{display:flex; gap:5px;}
  .ap-dot{width:9px; height:9px; border-radius:50%; border:1px solid var(--diamond); background:transparent;}
  .ap-dot.filled{background:var(--diamond);}

  .hand{display:flex; gap:0.9em; justify-content:center; min-height:150px; align-items:flex-end;}
  .card{
    width:92px; height:132px; border:1px solid var(--line); border-radius:8px;
    background:var(--panel); display:flex; flex-direction:column; align-items:center;
    justify-content:space-between; padding:0.7em 0.4em; cursor:pointer;
    transition:transform .15s ease, border-color .15s ease, box-shadow .15s ease;
    position:relative;
  }
  .card:hover{transform:translateY(-10px); border-color:var(--ink);}
  .card.disabled{opacity:0.35; cursor:not-allowed;}
  .card.disabled:hover{transform:none; border-color:var(--line);}
  .card.selected{
    border-color:var(--ink); transform:translateY(-10px);
    box-shadow:0 0 20px rgba(255,255,255,0.14);
  }
  .card .suit{font-size:1.9em;}
  .card .value{font-family:var(--mono); font-size:1.1em; letter-spacing:0.05em;}
  .card .desc{font-family:var(--mono); font-size:0.58em; color:var(--ink-dim); text-align:center; line-height:1.3;}
  .card.suit-spade .suit,.card.suit-spade .value{color:var(--spade);}
  .card.suit-heart .suit,.card.suit-heart .value{color:var(--heart);}
  .card.suit-diamond .suit,.card.suit-diamond .value{color:var(--diamond);}
  .card.suit-club .suit,.card.suit-club .value{color:var(--club);}

  .battle-actions{display:flex; gap:1em; margin-top:0.4em;}

  /* ---------- CARD SELECTION INFO PANEL ---------- */
  .card-select-panel{
    position:fixed; right:14px; top:50%; transform:translateY(-50%);
    width:min(240px, 42vw); max-height:76vh; overflow-y:auto;
    background:var(--panel); border:1px solid var(--line); border-radius:10px;
    padding:1.3em 1.1em; z-index:30; display:none;
    box-shadow:0 0 40px rgba(255,255,255,0.05);
  }
  .card-select-panel.active{display:block;}
  .csp-suit{font-size:1.6em; margin-bottom:0.15em;}
  .csp-name{font-size:1.1em; letter-spacing:0.1em; margin-bottom:0.15em;}
  .csp-type{font-family:var(--mono); font-size:0.7em; color:var(--ink-dim); margin-bottom:0.8em; letter-spacing:0.05em;}
  .csp-desc{font-size:0.88em; line-height:1.5; margin-bottom:1em;}
  .csp-divider{height:1px; background:var(--line); margin:0.9em 0;}
  .csp-combo-title{
    font-family:var(--mono); font-size:0.65em; letter-spacing:0.15em; color:var(--ink-dim);
    text-transform:uppercase; margin-bottom:0.7em;
  }
  .csp-combo-item{margin-bottom:0.7em; padding:0.6em 0.7em; border:1px solid var(--line); border-radius:6px;}
  .csp-combo-item:last-child{margin-bottom:0;}
  .csp-combo-pair{font-family:var(--mono); font-size:0.62em; color:var(--ink-dim); margin-bottom:0.3em;}
  .csp-combo-name{font-size:0.86em; color:var(--diamond); margin-bottom:0.25em;}
  .csp-combo-effect{font-family:var(--mono); font-size:0.65em; color:var(--ink-dim); line-height:1.4;}
  .csp-combo-empty{font-family:var(--mono); font-size:0.68em; color:var(--ink-dim); opacity:0.6;}
  /* combo entries become clickable actions once a real partner card is found in hand */
  .csp-combo-item.playable{cursor:pointer; border-color:var(--diamond); transition:background 0.15s, transform 0.1s;}
  .csp-combo-item.playable:hover{background:rgba(212,175,55,0.08);}
  .csp-combo-item.playable:active{transform:scale(0.98);}
  .csp-combo-item.playable.disabled{cursor:not-allowed; opacity:0.45; border-color:var(--line);}
  .csp-combo-item.playable.disabled:hover{background:none;}
  .csp-actions{display:flex; gap:0.6em; margin-top:1.2em;}
  .csp-actions .btn{flex:1; padding:0.65em 0.4em; font-size:0.72em;}

  .teach-tip{
    position:absolute; bottom:190px; left:50%; transform:translateX(-50%);
    background:var(--panel); border:1px solid var(--line); padding:0.8em 1.4em;
    font-family:var(--mono); font-size:0.75em; color:var(--ink-dim); letter-spacing:0.03em;
    max-width:340px; text-align:center; z-index:6;
  }

  /* ---------- VICTORY ---------- */
  .center-msg{text-align:center;}
  .center-msg h2{font-size:2.2em; letter-spacing:0.2em; font-weight:400; margin-bottom:0.3em;}
  .center-msg p{color:var(--ink-dim); font-family:var(--mono); font-size:0.85em; letter-spacing:0.1em;}
  .reward-card{
    margin:2em auto; width:110px; height:158px; border:1px solid var(--memory); border-radius:8px;
    background:var(--panel); display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:0.5em; box-shadow:0 0 34px rgba(82,195,176,0.18);
  }
  .reward-card .suit{font-size:2.4em; color:var(--memory);}
  .reward-card .name{font-family:var(--mono); font-size:0.68em; color:var(--memory); letter-spacing:0.08em;}

  /* ---------- ALBUM ---------- */
  #screen-album{align-items:center; justify-content:flex-start; padding-top:8vh;}
  .album-back-btn{
    position:absolute; top:14px; left:14px; padding:0.55em 1.1em; font-size:0.72em; z-index:6;
  }
  .album-header{text-align:center; margin-bottom:0.4em;}
  .album-header h2{font-size:1.7em; letter-spacing:0.3em; font-weight:400; margin:0;}
  .album-count{font-family:var(--mono); color:var(--ink-dim); font-size:0.8em; letter-spacing:0.1em; margin-top:0.3em;}
  .album-grid{
    display:grid; grid-template-columns:repeat(4, 78px); gap:1.1em; margin:2.4em 0 2em 0;
    max-width:420px; justify-content:center;
  }
  .album-slot{
    width:78px; height:110px; border:1px solid var(--line); border-radius:6px;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:0.35em;
    background:var(--panel);
  }
  .album-slot.filled.suit-spade{border-color:var(--spade);}
  .album-slot.filled.suit-heart{border-color:var(--heart);}
  .album-slot.filled.suit-diamond{border-color:var(--diamond);}
  .album-slot.filled.suit-club{border-color:var(--club);}
  .album-slot.filled.suit-memory{border-color:var(--memory);}
  .album-slot .suit{font-size:1.6em;}
  .album-slot.filled.suit-spade .suit{color:var(--spade);}
  .album-slot.filled.suit-heart .suit{color:var(--heart);}
  .album-slot.filled.suit-diamond .suit{color:var(--diamond);}
  .album-slot.filled.suit-club .suit{color:var(--club);}
  .album-slot.filled.suit-memory .suit{color:var(--memory);}
  .album-slot .aname{font-family:var(--mono); font-size:0.55em; color:var(--ink-dim); text-align:center;}
  .album-slot.empty{opacity:0.25;}
  .album-slot .aname.empty-txt{opacity:0.5;}

  .footnote{
    position:fixed; bottom:14px; left:50%; transform:translateX(-50%);
    font-family:var(--mono); font-size:0.65em; color:#3d3b35; letter-spacing:0.15em; z-index:2;
  }
  .sound-toggle{
    position:fixed; top:14px; right:14px; z-index:20;
    width:34px; height:34px; border-radius:50%; border:1px solid var(--line);
    background:rgba(13,13,13,0.6); color:var(--ink-dim); font-family:var(--mono);
    font-size:0.85em; display:flex; align-items:center; justify-content:center;
    cursor:pointer; transition:all .2s ease; touch-action:manipulation;
    -webkit-tap-highlight-color:transparent;
  }
  .sound-toggle:hover{border-color:var(--ink); color:var(--ink);}
  .sound-toggle.muted{opacity:0.4;}

  /* ---------- TOP-RIGHT MENU BUTTON ---------- */
  .menu-toggle{
    position:fixed; top:14px; right:58px; z-index:20;
    width:34px; height:34px; border-radius:50%; border:1px solid var(--line);
    background:rgba(13,13,13,0.6); color:var(--ink-dim); font-family:var(--mono);
    font-size:0.95em; display:flex; align-items:center; justify-content:center;
    cursor:pointer; transition:all .2s ease; touch-action:manipulation;
    -webkit-tap-highlight-color:transparent; -webkit-user-select:none; user-select:none;
  }
  .menu-toggle:hover{border-color:var(--ink); color:var(--ink);}

  #menu-overlay{
    position:fixed; inset:0; z-index:110; display:none;
    align-items:center; justify-content:center;
    background:rgba(0,0,0,0.86);
    backdrop-filter:blur(2px);
    animation:cd-fade-in .22s ease;
    cursor:pointer;
  }
  #menu-overlay.active{display:flex;}
  .menu-panel{
    width:min(300px, 84vw); background:var(--panel); border:1px solid var(--line);
    border-radius:10px; padding:2em 1.8em; text-align:center; cursor:default;
    box-shadow:0 0 60px rgba(255,255,255,0.06);
    animation:cd-pop-in .28s cubic-bezier(.2,.7,.3,1);
  }
  .menu-panel h3{font-size:1.2em; letter-spacing:0.3em; font-weight:400; margin:0 0 1.4em 0;}
  .menu-panel .btn{width:100%; margin-bottom:0.8em; box-sizing:border-box;}
  .menu-panel .btn:last-child{margin-bottom:0;}
  .menu-toast{
    position:fixed; top:56px; left:50%; transform:translateX(-50%); z-index:130;
    font-family:var(--mono); font-size:0.75em; letter-spacing:0.1em; color:var(--ink);
    background:rgba(13,13,13,0.85); border:1px solid var(--line); padding:0.6em 1.2em;
    opacity:0; pointer-events:none; transition:opacity .3s ease;
  }
  .menu-toast.show{opacity:1;}

  /* ---------- CARD DETAIL MODAL ---------- */
  .album-slot{cursor:pointer;}
  .album-slot.empty{cursor:default;}
  #card-detail-overlay{
    position:fixed; inset:0; z-index:100; display:none;
    align-items:center; justify-content:center;
    background:rgba(0,0,0,0.86);
    backdrop-filter:blur(2px);
    animation:cd-fade-in .22s ease;
    cursor:pointer;
  }
  #card-detail-overlay.active{display:flex;}
  @keyframes cd-fade-in{from{opacity:0;} to{opacity:1;}}
  .card-detail-panel{
    width:min(340px, 84vw); max-height:82vh; overflow-y:auto;
    background:var(--panel); border:1px solid var(--line); border-radius:10px;
    padding:2.2em 1.8em 1.8em 1.8em; text-align:center; cursor:default;
    box-shadow:0 0 60px rgba(255,255,255,0.06);
    animation:cd-pop-in .28s cubic-bezier(.2,.7,.3,1);
  }
  @keyframes cd-pop-in{from{opacity:0; transform:scale(0.92);} to{opacity:1; transform:scale(1);}}
  .cd-suit{font-size:3.2em; line-height:1;}
  .cd-name{font-size:1.5em; letter-spacing:0.15em; margin:0.3em 0 1.1em 0;}
  .cd-divider{height:1px; background:var(--line); margin:1em 0;}
  .cd-row{text-align:left; margin-bottom:1.1em;}
  .cd-row:last-child{margin-bottom:0;}
  .cd-label{
    font-family:var(--mono); font-size:0.65em; letter-spacing:0.2em; color:var(--ink-dim);
    text-transform:uppercase; margin-bottom:0.35em;
  }
  .cd-value{font-size:0.98em; line-height:1.55; font-weight:400;}
  .cd-value.rarity-普通{color:var(--ink-dim);}
  .cd-value.rarity-稀有{color:var(--memory);}
  .cd-value.rarity-罕见{color:var(--diamond);}
  .cd-close-hint{
    margin-top:1.6em; font-family:var(--mono); font-size:0.62em; letter-spacing:0.2em;
    color:var(--ink-dim); opacity:0.55;
  }
</style>
</head>
<body>
<div id="app">

  <!-- TITLE -->
  <div class="screen active" id="screen-title">
    <h1>命 运</h1>
    <div class="sub">DESTINY · DEMO</div>
    <button class="btn primary" id="btn-start">开始游戏</button>
  </div>

  <!-- STORY -->
  <div class="screen" id="screen-story">
    <div class="story-stage">
      <div class="story-hint">点击 屏幕 继续</div>
      <div class="dialogue-box">
        <div class="speaker" id="speaker-name">???</div>
        <div class="dialogue-text" id="dialogue-text"></div>
        <div class="continue-mark">▼</div>
      </div>
    </div>
  </div>

  <!-- TRANSITION -->
  <div class="screen" id="screen-transition">
    <div class="card-flip-wrap">
      <div class="card-glow" id="card-glow"></div>
      <div class="fate-card" id="fate-card">
        <div class="card-side card-back"><div class="back-mark">命</div></div>
        <div class="card-side card-front"><span class="pip-main" id="pip-main">♠</span></div>
      </div>
    </div>
    <div class="loading-text" id="loading-text">命运展开中...</div>
  </div>

  <!-- BATTLE -->
  <div class="screen" id="screen-battle">
    <div class="enemy-zone">
      <div class="enemy-name" id="enemy-name">失控兽</div>
      <div class="enemy-sprite" id="enemy-sprite">◈</div>
      <div class="hp-bar-wrap">
        <div class="hp-label"><span>HP</span><span id="enemy-hp-text">10/10</span></div>
        <div class="hp-bar"><div class="hp-fill" id="enemy-hp-fill" style="width:100%"></div></div>
      </div>
    </div>

    <div class="battle-center">
      <div class="log-line" id="battle-log"></div>
      <div class="status-tags" id="status-tags"></div>
    </div>

    <div class="teach-tip" id="teach-tip" style="display:none;"></div>

<script>
(function(){
  "use strict";

  /* ---------------- DATA ---------------- */
  const CARD_DEFS = {
    spade3:   { id:'spade3',   suit:'♠', suitClass:'suit-spade',   label:'黑桃3', type:'attack',  value:3, desc:'造成 3 点伤害',
                typeLabel:'攻击卡', rarity:'普通', story:'一张记录着命运力量的普通卡牌，锋芒藏于沉默之中。', obtain:'初次战斗解锁' },
    heart5:   { id:'heart5',   suit:'♥', suitClass:'suit-heart',   label:'红心5', type:'heal',    value:5, desc:'恢复 5 点生命',
                typeLabel:'治疗卡', rarity:'普通', story:'温热的气息封存其中，据说能抚平最深的伤口。', obtain:'初次战斗解锁' },
    diamond2: { id:'diamond2', suit:'♦', suitClass:'suit-diamond', label:'方块2', type:'buff',    value:2, desc:'下次攻击伤害+2',
                typeLabel:'强化卡', rarity:'普通', story:'棱角分明的光泽下，蕴藏着尚未释放的力量。', obtain:'初次战斗解锁' },
    club4:    { id:'club4',    suit:'♣', suitClass:'suit-club',    label:'梅花4', type:'special', value:4, desc:'跳过敌人下次攻击',
                typeLabel:'特殊卡', rarity:'普通', story:'幽暗的纹路扭曲着因果，让敌人的行动悄然落空。', obtain:'初次战斗解锁' },
  };
  const MEMORY_CARD = { id:'memory1', suit:'☆', suitClass:'suit-memory', label:'记忆·觉醒', desc:'第一段找回的记忆',
                typeLabel:'记忆卡', rarity:'稀有', story:'破碎意识中拾回的第一枚碎片，模糊却真实，是通往过去的第一道裂缝。', obtain:'首次战斗胜利后获得' };

  // suit-type mapping used both for combo checking and for the card-selection info panel
  const TYPE_TO_SUIT = { attack:'spade', heal:'heart', buff:'diamond', special:'club' };
  const SUIT_LABEL = { spade:'黑桃（攻击）', heart:'红心（治疗）', diamond:'方块（强化）', club:'梅花（特殊）' };
  // comboDatabase: independent combo data, not hard-coded into the UI.
  // Each entry declares which two suits (i.e. which two cards, since each
  // suit maps to exactly one card in this deck) are required, plus the
  // combo's own name/effect. The UI only ever reads from this list.
  //
  // BALANCE NOTE: a combo consumes two cards, so its payout must clearly
  // exceed what either card would do played alone, or players have no
  // reason to ever use one. Each effect below = both cards' own base
  // value combined + an extra bonus on top (computed in applyComboEffect).
  const COMBO_DEFS = [
    { pair:['spade','diamond'], key:'sd', name:'暴击强化',
      effect:`造成 ${CARD_DEFS.spade3.value + CARD_DEFS.diamond2.value + 3} 点伤害（基础攻击+强化+暴击加成，远高于单独出牌）` },
    { pair:['heart','spade'],   key:'hs', name:'绝境无敌',
      effect:`恢复 ${CARD_DEFS.heart5.value} 点生命，并获得下回合无敌状态` },
    { pair:['club','diamond'],  key:'cd', name:'命运逆转',
      effect:`跳过敌方下次攻击，并恢复 ${CARD_DEFS.diamond2.value * 3} 点生命` },
  ];
  // Single source of truth for what each combo actually does to state.
  // Used by both the explicit "click combo to fire" path (resolveCombo)
  // and the passive "played complementary suits this turn" path
  // (checkCombo), so the numbers can never drift apart between the two.
  function applyComboEffect(key){
    if (key === 'sd'){
      const dmg = CARD_DEFS.spade3.value + CARD_DEFS.diamond2.value + 3; // base attack + buff + crit bonus
      state.enemy.hp = Math.max(0, state.enemy.hp - dmg);
      const sprite = $('#enemy-sprite');
      sprite.classList.remove('hit'); void sprite.offsetWidth; sprite.classList.add('hit');
      AudioSys.playAttack();
      return `组合【暴击强化】发动：造成 ${dmg} 点伤害`;
    }
    if (key === 'hs'){
      const heal = CARD_DEFS.heart5.value; // full heal value, plus the shield below
      state.player.hp = Math.min(state.player.maxHp, state.player.hp + heal);
      state.player.invincibleNextEnemyTurn = true;
      AudioSys.playSpecial();
      return `组合【绝境无敌】发动：恢复 ${heal} 点生命，并获得下回合无敌状态`;
    }
    if (key === 'cd'){
      const heal = CARD_DEFS.diamond2.value * 3; // buff value amplified by the combo
      state.player.hp = Math.min(state.player.maxHp, state.player.hp + heal);
      state.player.skipEnemyAttack = true;
      AudioSys.playHeal();
      return `组合【命运逆转】发动：跳过敌方下次攻击，并恢复 ${heal} 点生命`;
    }
    return '';
  }
  function getCombosForSuit(suit){
    return COMBO_DEFS
      .filter(c => c.pair.includes(suit))
      .map(c => ({ ...c, partner: c.pair.find(s => s !== suit) }));
  }
  // Scans the CURRENT hand (not just suit theory) for combos that are
  // actually playable right now given the selected card: for every combo
  // that involves the selected card's suit, look for a different card in
  // hand carrying the partner suit. Returns only real, executable matches.
  function findAvailableCombos(selectedIdx){
    const hand = state.player.hand;
    const cardId = hand[selectedIdx];
    if (!cardId) return [];
    const def = CARD_DEFS[cardId];
    const suit = TYPE_TO_SUIT[def.type];
    const matches = [];
    getCombosForSuit(suit).forEach(combo => {
      for (let i = 0; i < hand.length; i++){
        if (i === selectedIdx) continue;
        const otherDef = CARD_DEFS[hand[i]];
        if (TYPE_TO_SUIT[otherDef.type] === combo.partner){
          matches.push({ combo, partnerIdx: i });
          break; // one partner card is enough to make this combo available
        }
      }
    });
    return matches;
  }

  const STORY = [
    { speaker:'玩家',  lines:['天啊，这是哪儿？','我怎么会在这里？'] },
    { speaker:'萨拉',  lines:['你醒了。','别动，你刚刚伤得很重。'] },
    { speaker:'泰勒',  lines:['萨拉！','他醒了！','快过来看看！'] },
    { speaker:'伯恩',  lines:['大哥哥。','你叫什么名字？','你从哪里来？','还记得回去的路吗？'] },
    { speaker:'玩家',  lines:['我……','我不知道。','我什么都不记得了。'] },
    { speaker:'伯恩',  lines:['连自己是谁都不知道？','这下麻烦了。'] },
    { speaker:'萨拉',  lines:['不如先带他回去。','至少让他恢复。'] },
    { speaker:'泰勒',  lines:['我觉得可以！','总不能把他丢在这里。'] },
    { speaker:'艾莉',  lines:['我反对。','一个连自己是谁都不知道的人。','你们真的放心带他回去？','而且……','他的身上有危险的气息。'] },
    { speaker:'泰勒',  lines:['危险？','你能感觉出来？'] },
    { speaker:'艾莉',  lines:['当然。','否则你们不知道死多少次了。'] },
    { speaker:'艾莉',  lines:['等等！','那是什么？'] },
  ];
  const DIALOGUE_QUEUE = [];
  STORY.forEach(block => block.lines.forEach(line => DIALOGUE_QUEUE.push({ speaker: block.speaker, text: line })));

  /* ---------------- STATE ---------------- */
  const state = {
    dialogueIndex: 0,
    player: { hp:20, maxHp:20, ap:3, maxAp:3, hand:[], deck:[], discard:[], buffNextAtk:0, invincibleNextEnemyTurn:false, skipEnemyAttack:false },
    enemy: { name:'失控兽', hp:10, maxHp:10, atk:3 },
    cardsPlayedThisTurn: 0,
    suitsPlayedThisTurn: [],
    combosUsedThisTurn: [],
    collection: new Set(['spade3','heart5','diamond2','club4']),
    firstTurn: true,
    currentScreen: 'screen-title',
    previousScreen: 'screen-title',
    selectedCardIdx: null,
    dialogueDone: false,
  };

  /* ---------------- UTIL ---------------- */
  function $(sel){ return document.querySelector(sel); }
  function showScreen(id){
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    $('#' + id).classList.add('active');
    state.currentScreen = id;
    AudioSys.onScreen(id);
  }
  /* ---------------- GLOBAL CLICK SOUND ---------------- */
  function playClickSound(){
    AudioSys.init();
    AudioSys.playClick();
  }
  function shuffle(arr){
    for (let i = arr.length - 1; i > 0; i--){
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  /* ---------------- AUDIO SYSTEM ---------------- */
  const AudioSys = (function(){
    let ctx = null, master = null, musicGain = null, sfxGain = null;
    let layer = null, currentScene = null, muted = false;
    const VOL = 0.35;

    function init(){
      if (ctx) return;
      try{
        ctx = new (window.AudioContext || window.webkitAudioContext)();
        master = ctx.createGain(); master.gain.value = muted ? 0 : VOL; master.connect(ctx.destination);
        musicGain = ctx.createGain(); musicGain.gain.value = 1; musicGain.connect(master);
        sfxGain = ctx.createGain(); sfxGain.gain.value = 0.9; sfxGain.connect(master);
      } catch(e){ ctx = null; }
    }

    function noiseBuffer(sec){
      const buf = ctx.createBuffer(1, Math.max(1, Math.floor(ctx.sampleRate*sec)), ctx.sampleRate);
      const d = buf.getChannelData(0);
      for (let i=0;i<d.length;i++) d[i] = Math.random()*2-1;
      return buf;
    }

    function fadeGain(node, val, dur){
      const now = ctx.currentTime;
      node.gain.cancelScheduledValues(now);
      node.gain.setValueAtTime(node.gain.value, now);
      node.gain.linearRampToValueAtTime(val, now+dur);
    }

    /* ---- SFX primitives ---- */
    function tone(freq, dur, type, gainVal, glideTo){
      if (!ctx) return;
      const osc = ctx.createOscillator();
      osc.type = type || 'sine';
      osc.frequency.setValueAtTime(freq, ctx.currentTime);
      if (glideTo) osc.frequency.exponentialRampToValueAtTime(glideTo, ctx.currentTime+dur);
      const g = ctx.createGain();
      g.gain.setValueAtTime(0.0001, ctx.currentTime);
      g.gain.linearRampToValueAtTime(gainVal, ctx.currentTime+0.02);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+dur);
      osc.connect(g); g.connect(sfxGain);
      osc.start(); osc.stop(ctx.currentTime+dur+0.02);
    }
    function burst(dur, filterFreq, filterType, gainVal){
      if (!ctx) return;
      const src = ctx.createBufferSource();
      src.buffer = noiseBuffer(dur);
      const filt = ctx.createBiquadFilter();
      filt.type = filterType || 'highpass'; filt.frequency.value = filterFreq || 1000;
      const g = ctx.createGain();
      g.gain.setValueAtTime(gainVal, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+dur);
      src.connect(filt); filt.connect(g); g.connect(sfxGain);
      src.start(); src.stop(ctx.currentTime+dur+0.02);
    }

    /* ---- Ambient scene layers ---- */
    /* Title: spacious sustained pad + slow, fixed 4-note melodic loop.
       No randomness — a deliberate, repeating theme ("destiny begins to turn"). */
    function buildTitleLayer(){
      const g = ctx.createGain(); g.gain.value = 0; g.connect(musicGain);

      // low sustained pad (mystery / open space, unchanged in character)
      const o1 = ctx.createOscillator(); o1.type='sine'; o1.frequency.value = 55;
      const o2 = ctx.createOscillator(); o2.type='sine'; o2.frequency.value = 82.4;
      const g1 = ctx.createGain(); g1.gain.value=0.45; o1.connect(g1); g1.connect(g);
      const g2 = ctx.createGain(); g2.gain.value=0.24; o2.connect(g2); g2.connect(g);
      o1.start(); o2.start();

      // fixed slow melodic loop — simple, repeating, no randomness
      const melody = [220.00, 261.63, 293.66, 246.94]; // A3, C4, D4, B3
      const noteDur = 3.4, noteGap = 3.8;
      let stopped = false, idx = 0, timer = null;
      function playNote(){
        if (stopped) return;
        const freq = melody[idx % melody.length];
        idx++;
        const osc = ctx.createOscillator(); osc.type='sine'; osc.frequency.value = freq;
        const ng = ctx.createGain();
        ng.gain.setValueAtTime(0.0001, ctx.currentTime);
        ng.gain.linearRampToValueAtTime(0.09, ctx.currentTime + 1.0);
        ng.gain.linearRampToValueAtTime(0.055, ctx.currentTime + noteDur*0.6);
        ng.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + noteDur);
        osc.connect(ng); ng.connect(g);
        osc.start(); osc.stop(ctx.currentTime + noteDur + 0.05);
        timer = setTimeout(playNote, noteGap*1000);
      }
      timer = setTimeout(playNote, 700);

      return { gain:g, stop(){
        stopped = true; clearTimeout(timer);
        [o1,o2].forEach(n=>{ try{n.stop();}catch(e){} });
      } };
    }

    /* Story: quiet, sad music-box theme. Fixed melody with rests — no randomness. */
    function buildStoryLayer(){
      const g = ctx.createGain(); g.gain.value = 0; g.connect(musicGain);
      const drone = ctx.createOscillator(); drone.type='sine'; drone.frequency.value=110;
      const dg = ctx.createGain(); dg.gain.value=0.06; drone.connect(dg); dg.connect(g);
      drone.start();

      // fixed sad melody (freq, hold time in seconds before next step); null = rest
      const sequence = [
        { f:392.00, d:2.2 }, // G4
        { f:349.23, d:1.6 }, // F4
        { f:null,   d:1.0 },
        { f:329.63, d:2.4 }, // E4
        { f:293.66, d:1.6 }, // D4
        { f:null,   d:1.2 },
        { f:261.63, d:2.8 }, // C4
        { f:293.66, d:1.8 }, // D4
        { f:null,   d:2.0 },
      ];
      let stopped = false, idx = 0, timer = null;
      function step(){
        if (stopped) return;
        const note = sequence[idx % sequence.length];
        idx++;
        if (note.f){
          const osc = ctx.createOscillator(); osc.type='triangle'; osc.frequency.value = note.f;
          const ng = ctx.createGain();
          ng.gain.setValueAtTime(0.0001, ctx.currentTime);
          ng.gain.linearRampToValueAtTime(0.1, ctx.currentTime + 0.03);
          ng.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 1.6);
          osc.connect(ng); ng.connect(g);
          osc.start(); osc.stop(ctx.currentTime + 1.7);
        }
        timer = setTimeout(step, note.d*1000);
      }
      timer = setTimeout(step, 600);

      return { gain:g, stop(){ stopped=true; clearTimeout(timer); try{drone.stop();}catch(e){} } };
    }

    /* Battle: low, filtered drone + a fixed "lub-dub" heartbeat/kick pulse at a
       steady tempo, for tension and rhythm without disrupting play. */
    function buildBattleLayer(){
      const g = ctx.createGain(); g.gain.value = 0; g.connect(musicGain);
      const drone = ctx.createOscillator(); drone.type='sawtooth'; drone.frequency.value=65;
      const filt = ctx.createBiquadFilter(); filt.type='lowpass'; filt.frequency.value=220;
      const dg = ctx.createGain(); dg.gain.value=0.065;
      drone.connect(filt); filt.connect(dg); dg.connect(g); drone.start();

      let stopped = false, timer = null, beat = 0;
      const tempoMs = 560; // steady driving pulse
      function pulse(){
        if (stopped) return;
        const strong = beat % 2 === 0; // "lub" (strong) / "dub" (soft) alternation
        const osc = ctx.createOscillator(); osc.type='sine';
        osc.frequency.setValueAtTime(strong ? 62 : 78, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(strong ? 34 : 42, ctx.currentTime + 0.16);
        const ng = ctx.createGain();
        ng.gain.setValueAtTime(strong ? 0.24 : 0.13, ctx.currentTime);
        ng.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + (strong ? 0.22 : 0.15));
        osc.connect(ng); ng.connect(g);
        osc.start(); osc.stop(ctx.currentTime + 0.3);
        beat++;
        timer = setTimeout(pulse, tempoMs);
      }
      timer = setTimeout(pulse, 300);

      return { gain:g, stop(){ stopped=true; clearTimeout(timer); try{drone.stop();}catch(e){} } };
    }

    const BUILDERS = { title:buildTitleLayer, story:buildStoryLayer, battle:buildBattleLayer };

    function setScene(name, fade){
      if (!ctx || muted===null) {}
      if (!ctx) return;
      if (currentScene === name) return;
      currentScene = name;
      const old = layer;
      const dur = fade == null ? 1.1 : fade;
      if (old){ fadeGain(old.gain, 0, dur); setTimeout(()=>old.stop(), dur*1000+80); }
      if (name && BUILDERS[name]){
        layer = BUILDERS[name]();
        fadeGain(layer.gain, 1, dur);
      } else {
        layer = null;
      }
    }

    function onScreen(screenId){
      if (!ctx) return;
      const map = { 'screen-title':'title', 'screen-story':'story', 'screen-battle':'battle',
                    'screen-victory':'story', 'screen-defeat':'story', 'screen-album':'story' };
      if (map[screenId]) setScene(map[screenId]);
    }

    return {
      init,
      onScreen,
      toggleMute(){
        muted = !muted;
        if (ctx) fadeGain(master, muted ? 0 : VOL, 0.25);
        return muted;
      },
      isMuted(){ return muted; },
      playCardWhoosh(){ init(); burst(0.5, 1800, 'highpass', 0.16); tone(90,0.6,'sine',0.12,50); },
      playDraw(){ if(!ctx) return; burst(0.09, 3200, 'highpass', 0.1); },
      playAttack(){ if(!ctx) return; tone(130,0.22,'square',0.16,55); burst(0.08,2200,'lowpass',0.09); },
      playHeal(){ if(!ctx) return; tone(660,0.5,'sine',0.13,880); },
      playBuff(){ if(!ctx) return; tone(440,0.3,'triangle',0.13,660); },
      playSpecial(){ if(!ctx) return; tone(220,0.35,'sawtooth',0.1,330); burst(0.12,1600,'bandpass',0.06); },
      playEnemyHit(){ if(!ctx) return; tone(85,0.35,'sine',0.22,40); burst(0.12,180,'lowpass',0.18); },
      playDeflect(){ if(!ctx) return; tone(520,0.3,'sine',0.1,700); },
      playVictory(){ if(!ctx) return; [523.3,659.3,784.0].forEach((f,i)=>setTimeout(()=>tone(f,0.7,'sine',0.14),i*160)); },
      playDefeat(){ if(!ctx) return; tone(160,1.0,'sine',0.16,70); },
      /* subtle mechanical/paper click for general UI interaction feedback */
      playClick(){ if(!ctx) return; burst(0.045, 2600, 'highpass', 0.055); tone(880,0.03,'sine',0.02); }
    };
  })();

  /* ---------------- STORY SCREEN ---------------- */
  function renderDialogue(){
    const entry = DIALOGUE_QUEUE[state.dialogueIndex];
    const nameEl = $('#speaker-name');
    nameEl.textContent = entry.speaker;
    nameEl.classList.toggle('is-player', entry.speaker === '玩家');
    $('#dialogue-text').textContent = entry.text;
  }
  function advanceDialogue(){
    playClickSound();
    state.dialogueIndex++;
    if (state.dialogueIndex >= DIALOGUE_QUEUE.length){
      $('#screen-story').removeEventListener('click', advanceDialogue);
      state.dialogueDone = true;
      runTransition('battle');
      return;
    }
    renderDialogue();
  }

  /* ---------------- TRANSITION ---------------- */
  const SUITS = [
    { s:'♠', color:'var(--spade)' }, { s:'♦', color:'var(--diamond)' },
    { s:'♥', color:'var(--heart)' }, { s:'♣', color:'var(--club)' }
  ];

  function playFateCardAnimation(target){
    const card = $('#fate-card');
    const pip = $('#pip-main');
    const glow = $('#card-glow');
    const loadingText = $('#loading-text');

    // reset to card-back, no transition, force reflow
    card.style.transition = 'none';
    card.style.transform = 'rotateY(0deg) scale(0.86)';
    glow.classList.remove('show');
    loadingText.textContent = '命运展开中...';
    void card.offsetWidth;

    // Phase 1 (0-260ms): card floats in, still showing its back
    requestAnimationFrame(() => {
      card.style.transition = 'transform .26s ease-out';
      card.style.transform = 'rotateY(0deg) scale(1)';
    });

    // Phase 2 (260-1180ms): flash suits while spinning fast through multiple turns
    let flashIdx = 0;
    const flashTimer = setInterval(() => {
      const suit = SUITS[flashIdx % SUITS.length];
      pip.textContent = suit.s;
      pip.style.color = suit.color;
      flashIdx++;
    }, 85);

    setTimeout(() => {
      card.style.transition = 'transform .92s cubic-bezier(.32,.08,.18,1)';
      // 900deg % 360 = 180 -> ends facing front
      card.style.transform = 'rotateY(900deg) scale(1.04)';
    }, 260);

    // Phase 3 (1180-1620ms): settle on final suit, glow + gentle bounce
    setTimeout(() => {
      clearInterval(flashTimer);
      const finalSuit = SUITS[Math.floor(Math.random()*SUITS.length)];
      pip.textContent = finalSuit.s;
      pip.style.color = finalSuit.color;
      card.style.transition = 'transform .44s ease-out';
      card.style.transform = 'rotateY(900deg) scale(1)';
      glow.classList.add('show');
      loadingText.textContent = target === 'album' ? '翻开记忆...' : '进入战斗...';
    }, 1180);
  }

  function runTransition(target){
    showScreen('screen-transition');
    AudioSys.playCardWhoosh();
    playFateCardAnimation(target);

    setTimeout(() => {
      if (target === 'battle') startBattle();
      else if (target === 'album') showAlbum();
    }, 2000);
  }

  /* ---------------- BATTLE ---------------- */
  function buildDeck(){
    const deck = [];
    Object.keys(CARD_DEFS).forEach(id => {
      for (let i = 0; i < 3; i++) deck.push(id);
    });
    return shuffle(deck);
  }

  function startBattle(){
    state.player.hp = state.player.maxHp;
    state.player.ap = state.player.maxAp;
    state.player.hand = [];
    state.player.discard = [];
    state.player.buffNextAtk = 0;
    state.player.invincibleNextEnemyTurn = false;
    state.player.skipEnemyAttack = false;
    state.enemy.hp = state.enemy.maxHp;
    state.cardsPlayedThisTurn = 0;
    state.suitsPlayedThisTurn = [];
    state.combosUsedThisTurn = [];
    state.firstTurn = true;
    state.selectedCardIdx = null;

    state.player.deck = buildDeck();
    for (let i = 0; i < 3; i++) drawCard();

    showScreen('screen-battle');
    renderBattle();

    $('#teach-tip').style.display = 'block';
    $('#teach-tip').textContent = '点击手牌先查看：若手牌中能组成组合，点击组合直接发动；若无组合，点击"使用卡牌"出普通攻击。每回合最多行动 3 次，之后点击"结束回合"，敌人才会行动。';
  }

  function drawCard(){
    if (state.player.hand.length >= 6) return;
    if (state.player.deck.length === 0){
      if (state.player.discard.length === 0) return;
      state.player.deck = shuffle(state.player.discard);
      state.player.discard = [];
    }
    state.player.hand.push(state.player.deck.pop());
    AudioSys.playDraw();
  }

  function setLog(msg){
    const el = $('#battle-log');
    el.textContent = msg;
    el.classList.remove('show');
    void el.offsetWidth;
    el.classList.add('show');
  }

  function renderBattle(){
    $('#enemy-hp-text').textContent = `${state.enemy.hp}/${state.enemy.maxHp}`;
    $('#enemy-hp-fill').style.width = Math.max(0, (state.enemy.hp / state.enemy.maxHp) * 100) + '%';
    $('#player-hp-text').textContent = `${state.player.hp}/${state.player.maxHp}`;
    $('#player-hp-fill').style.width = Math.max(0, (state.player.hp / state.player.maxHp) * 100) + '%';

    const apDots = $('#ap-dots');
    apDots.innerHTML = '';
    for (let i = 0; i < state.player.maxAp; i++){
      const d = document.createElement('div');
      d.className = 'ap-dot' + (i < state.player.ap ? ' filled' : '');
      apDots.appendChild(d);
    }

    const tags = $('#status-tags');
    tags.innerHTML = '';
    if (state.player.buffNextAtk > 0) addTag(tags, `强化 +${state.player.buffNextAtk}`);
    if (state.player.skipEnemyAttack) addTag(tags, '敌方攻击将被跳过');
    if (state.player.invincibleNextEnemyTurn) addTag(tags, '无敌状态');

    const hand = $('#hand');
    hand.innerHTML = '';
    const cardLimitReached = state.cardsPlayedThisTurn >= 3;
    if (state.selectedCardIdx !== null && state.selectedCardIdx >= state.player.hand.length){
      state.selectedCardIdx = null;
    }
    state.player.hand.forEach((cardId, idx) => {
      const def = CARD_DEFS[cardId];
      const disabled = state.player.ap < 1 || cardLimitReached;
      const selected = state.selectedCardIdx === idx;
      const card = document.createElement('div');
      card.className = `card ${def.suitClass}` + (disabled ? ' disabled' : '') + (selected ? ' selected' : '');
      card.innerHTML = `
        <div class="suit">${def.suit}</div>
        <div class="value">${def.label}</div>
        <div class="desc">${def.desc}</div>
      `;
      // clicking a card only selects it for viewing — it never plays it directly
      card.addEventListener('click', () => selectCard(idx));
      hand.appendChild(card);
    });
    renderCardSelectPanel();
  }

  /* ---------------- CARD SELECTION (view-only, does not play the card) ---------------- */
  function selectCard(idx){
    playClickSound();
    state.selectedCardIdx = (state.selectedCardIdx === idx) ? null : idx;
    renderBattle();
  }

  function renderCardSelectPanel(){
    const panel = $('#card-select-panel');
    const idx = state.selectedCardIdx;
    const cardId = (idx !== null) ? state.player.hand[idx] : null;
    if (!cardId){
      panel.classList.remove('active');
      return;
    }
    const def = CARD_DEFS[cardId];
    const suit = TYPE_TO_SUIT[def.type];
    $('#csp-suit').textContent = def.suit;
    $('#csp-suit').className = 'csp-suit ' + def.suitClass;
    $('#csp-name').textContent = def.label;
    $('#csp-type').textContent = def.typeLabel || '——';
    $('#csp-desc').textContent = def.desc;

    const cardLimitReached = state.cardsPlayedThisTurn >= 3;
    const disabled = state.player.ap < 1 || cardLimitReached;

    // Step 1 of the click: check the CURRENT hand for real, executable combos
    // involving this card (not just theoretical suit pairings).
    const matches = findAvailableCombos(idx);
    const list = $('#csp-combo-list');
    const title = $('#csp-combo-title');
    list.innerHTML = '';

    if (matches.length > 0){
      // Combos exist: only the combo buttons are offered. Picking one
      // immediately consumes both cards and resolves the effect — no
      // separate "confirm play" step.
      title.textContent = '可发动组合 · 点击直接发动';
      matches.forEach(m => {
        const partnerId = state.player.hand[m.partnerIdx];
        const partnerDef = CARD_DEFS[partnerId];
        const row = document.createElement('div');
        row.className = 'csp-combo-item playable' + (disabled ? ' disabled' : '');
        row.innerHTML = `
          <div class="csp-combo-pair">需要：${def.label} + ${partnerDef.label}</div>
          <div class="csp-combo-name">${m.combo.name}</div>
          <div class="csp-combo-effect">效果：${m.combo.effect}</div>
        `;
        row.addEventListener('click', () => {
          if (disabled) return;
          resolveCombo(idx, m.partnerIdx, m.combo);
        });
        list.appendChild(row);
      });
      // No combo available right now, so there's nothing to "confirm" separately.
      $('#csp-btn-use').style.display = 'none';
    } else {
      // No combo can be formed with the current hand: fall back to a plain
      // single-card play, chosen explicitly via the "使用卡牌" button.
      title.textContent = '普通攻击';
      list.innerHTML = '<div class="csp-combo-empty">当前手牌无法组成组合，可直接出牌</div>';
      $('#csp-btn-use').style.display = '';
      $('#csp-btn-use').disabled = disabled;
    }

    panel.classList.add('active');
  }
  function addTag(container, text){
    const t = document.createElement('div');
    t.className = 'tag';
    t.textContent = text;
    container.appendChild(t);
  }

  // Executes the actual card play: animation, battle calculation, enemy turn.
  // Only ever called from the "使用卡牌" (confirm) button — never from selecting a card.
  function confirmPlayCard(){
    const idx = state.selectedCardIdx;
    if (idx === null || idx === undefined) return;
    if (state.cardsPlayedThisTurn >= 3) return;
    const cardId = state.player.hand[idx];
    if (!cardId) return;
    const def = CARD_DEFS[cardId];
    if (state.player.ap < 1) return;

    playClickSound();
    state.selectedCardIdx = null;
    state.player.ap -= 1;
    state.cardsPlayedThisTurn += 1;
    state.player.hand.splice(idx, 1);
    state.player.discard.push(cardId);

    let logMsg = '';
    if (def.type === 'attack'){
      const dmg = def.value + state.player.buffNextAtk;
      state.player.buffNextAtk = 0;
      state.enemy.hp = Math.max(0, state.enemy.hp - dmg);
      logMsg = `你打出 ${def.label}，造成 ${dmg} 点伤害`;
      const sprite = $('#enemy-sprite');
      sprite.classList.remove('hit'); void sprite.offsetWidth; sprite.classList.add('hit');
      AudioSys.playAttack();
    } else if (def.type === 'heal'){
      const before = state.player.hp;
      state.player.hp = Math.min(state.player.maxHp, state.player.hp + def.value);
      logMsg = `你打出 ${def.label}，恢复 ${state.player.hp - before} 点生命`;
      AudioSys.playHeal();
    } else if (def.type === 'buff'){
      state.player.buffNextAtk += def.value;
      logMsg = `你打出 ${def.label}，下次攻击将强化`;
      AudioSys.playBuff();
    } else if (def.type === 'special'){
      state.player.skipEnemyAttack = true;
      logMsg = `你打出 ${def.label}，敌人的下次攻击将被跳过`;
      AudioSys.playSpecial();
    }

    checkCombo(def.type);
    setLog(logMsg);
    renderBattle();

    if (state.enemy.hp <= 0){
      setTimeout(onVictory, 500);
      return;
    }
  }

  // Executes a combo the player explicitly picked from the combo list.
  // This is an action-phase step: it consumes both cards, applies the
  // combo's effect, and resolves immediately — there is no further
  // "confirm play" click, matching the plain single-card flow's cost of
  // 1 action point and counting once against the per-turn play limit.
  function resolveCombo(selectedIdx, partnerIdx, comboDef){
    if (state.cardsPlayedThisTurn >= 3) return;
    if (state.player.ap < 1) return;
    const hand = state.player.hand;
    const cardA = hand[selectedIdx];
    const cardB = hand[partnerIdx];
    if (!cardA || !cardB) return;

    playClickSound();
    state.selectedCardIdx = null;
    state.player.ap -= 1;
    state.cardsPlayedThisTurn += 1;

    // remove the higher index first so the other index stays valid
    [selectedIdx, partnerIdx].sort((a, b) => b - a).forEach(i => {
      state.player.discard.push(state.player.hand[i]);
      state.player.hand.splice(i, 1);
    });

    const labelA = CARD_DEFS[cardA].label;
    const labelB = CARD_DEFS[cardB].label;

    const effectMsg = applyComboEffect(comboDef.key);
    const logMsg = `${labelA} + ${labelB} → ${effectMsg}`;

    // mark this combo as used this turn so the passive multi-play combo
    // check (below) never fires the same combo a second time
    if (!state.combosUsedThisTurn.includes(comboDef.key)){
      state.combosUsedThisTurn.push(comboDef.key);
    }

    setLog(logMsg);
    renderBattle();

    if (state.enemy.hp <= 0){
      setTimeout(onVictory, 500);
    }
  }

  function checkCombo(playedType){
    const played = TYPE_TO_SUIT[playedType];
    state.suitsPlayedThisTurn.push(played);

    const has = s => state.suitsPlayedThisTurn.includes(s);
    function tryCombo(a, b, key){
      if (state.combosUsedThisTurn.includes(key)) return;
      if (has(a) && has(b)){
        state.combosUsedThisTurn.push(key);
        const msg = applyComboEffect(key);
        setTimeout(() => setLog(msg), 700);
      }
    }
    tryCombo('spade','diamond','sd');
    tryCombo('heart','spade','hs');
    tryCombo('club','diamond','cd');
  }

  function endTurn(){
    state.selectedCardIdx = null;
    $('#teach-tip').style.display = 'none';
    state.firstTurn = false;
    // enemy attack phase
    let dmg = state.enemy.atk;
    let msg;
    if (state.player.skipEnemyAttack){
      dmg = 0;
      msg = `${state.enemy.name} 的攻击被跳过了`;
      state.player.skipEnemyAttack = false;
      AudioSys.playDeflect();
    } else if (state.player.invincibleNextEnemyTurn){
      dmg = 0;
      msg = `你处于无敌状态，完全抵挡了攻击`;
      state.player.invincibleNextEnemyTurn = false;
      AudioSys.playDeflect();
    } else {
      state.player.hp = Math.max(0, state.player.hp - dmg);
      msg = `${state.enemy.name} 发动攻击，你受到 ${dmg} 点伤害`;
      AudioSys.playEnemyHit();
    }
    setLog(msg);

    // reset turn state
    state.player.ap = state.player.maxAp;
    state.cardsPlayedThisTurn = 0;
    state.suitsPlayedThisTurn = [];
    state.combosUsedThisTurn = [];
    drawCard();

    renderBattle();

    if (state.player.hp <= 0){
      setTimeout(onDefeat, 500);
    }
  }

  function onVictory(){
    state.collection.add(MEMORY_CARD.id);
    showScreen('screen-victory');
    AudioSys.playVictory();
  }
  function onDefeat(){
    showScreen('screen-defeat');
    AudioSys.playDefeat();
  }

  /* ---------------- ALBUM ---------------- */
  function showAlbum(){
    if (state.currentScreen !== 'screen-album'){
      state.previousScreen = state.currentScreen;
    }
    const grid = $('#album-grid');
    grid.innerHTML = '';
    const allCards = [...Object.values(CARD_DEFS), MEMORY_CARD];
    allCards.forEach(def => {
      const owned = state.collection.has(def.id);
      const slot = document.createElement('div');
      slot.className = `album-slot ${owned ? 'filled ' + def.suitClass : 'empty'}`;
      slot.innerHTML = `
        <div class="suit">${owned ? def.suit : '?'}</div>
        <div class="aname ${owned ? '' : 'empty-txt'}">${owned ? def.label : '未收录'}</div>
      `;
      if (owned){
        bindLongPress(slot, () => openCardDetail(def));
      }
      grid.appendChild(slot);
    });
    $('#album-count').textContent = `已收录 ${state.collection.size}/52`;
    showScreen('screen-album');

  function closeAlbum(){
    const target = state.previousScreen || 'screen-title';
    showScreen(target);
  }

  /* ---------------- LONG PRESS (card detail trigger) ---------------- */
  const LONG_PRESS_MS = 600;
  function bindLongPress(el, onLongPress){
    let timer = null;
    let fired = false;

    function start(e){
      fired = false;
      clearTimeout(timer);
      timer = setTimeout(() => {
        fired = true;
        onLongPress();
      }, LONG_PRESS_MS);
    }
    function cancel(){
      clearTimeout(timer);
    }

    // Mouse (PC)
    el.addEventListener('mousedown', start);
    el.addEventListener('mouseup', cancel);
    el.addEventListener('mouseleave', cancel);

    // Touch (mobile)
    el.addEventListener('touchstart', (e) => { start(e); }, { passive:true });
    el.addEventListener('touchend', cancel);
    el.addEventListener('touchcancel', cancel);
    el.addEventListener('touchmove', cancel);

    // prevent the mobile long-press context menu / text selection callout
    el.addEventListener('contextmenu', (e) => e.preventDefault());
  }

  /* ---------------- CARD DETAIL MODAL ---------------- */

    $('#cd-type').textContent = def.typeLabel || '——';
    $('#cd-desc').textContent = def.desc || '——';

    rarityEl.className = 'cd-value rarity-' + (def.rarity || '');

  /* ---------------- SAVE / LOAD (Demo, localStorage) ---------------- */
  const SAVE_KEY = 'destiny_demo_save_v1';

  function showToast(msg){
    const el = $('#menu-toast');
    el.textContent = msg;
    el.classList.remove('show');
    void el.offsetWidth;
    el.classList.add('show');
    clearTimeout(showToast._t);
    showToast._t = setTimeout(() => el.classList.remove('show'), 1800);
  }

  function saveGame(){
    try{
      const data = {
        currentScreen: state.currentScreen,
        dialogueIndex: state.dialogueIndex,
        dialogueDone: state.dialogueDone,
        collection: Array.from(state.collection),
        player: {
          hp: state.player.hp, maxHp: state.player.maxHp,
          ap: state.player.ap, maxAp: state.player.maxAp,
          hand: state.player.hand.slice(), deck: state.player.deck.slice(), discard: state.player.discard.slice(),
          buffNextAtk: state.player.buffNextAtk,
          invincibleNextEnemyTurn: state.player.invincibleNextEnemyTurn,
          skipEnemyAttack: state.player.skipEnemyAttack
        },
        enemy: { name: state.enemy.name, hp: state.enemy.hp, maxHp: state.enemy.maxHp, atk: state.enemy.atk },
        cardsPlayedThisTurn: state.cardsPlayedThisTurn,
        firstTurn: state.firstTurn
      };
      localStorage.setItem(SAVE_KEY, JSON.stringify(data));
      showToast('已保存当前进度');
    } catch(e){
      showToast('保存失败');
    }
  }

  function loadGame(){
    let data;
    try{
      const raw = localStorage.getItem(SAVE_KEY);
      if (!raw){ showToast('没有找到存档'); return; }
      data = JSON.parse(raw);
    } catch(e){ showToast('读取存档失败'); return; }

    state.currentScreen = data.currentScreen || 'screen-title';
    state.dialogueIndex = data.dialogueIndex || 0;
    state.dialogueDone = !!data.dialogueDone;
    state.collection = new Set(data.collection || ['spade3','heart5','diamond2','club4']);
    Object.assign(state.player, data.player || {});
    Object.assign(state.enemy, data.enemy || {});
    state.cardsPlayedThisTurn = data.cardsPlayedThisTurn || 0;
    state.suitsPlayedThisTurn = [];
    state.combosUsedThisTurn = [];
    state.firstTurn = !!data.firstTurn;
    state.selectedCardIdx = null;

    closeMenu();
    const target = state.currentScreen;
    if (target === 'screen-battle'){
      showScreen('screen-battle');
      renderBattle();
    } else if (target === 'screen-story'){
      showScreen('screen-story');
      renderDialogue();
    } else if (target === 'screen-album'){
      showAlbum();
    } else {
      showScreen(target);
    }
    showToast('已读取存档');
  }

    closeMenu();
  });

  $('#btn-album-back').addEventListener('click', () => { playClickSound(); closeAlbum(); });

  $('#csp-btn-use').addEventListener('click', () => { confirmPlayCard(); });
  $('#csp-btn-cancel').addEventListener('click', () => {
    playClickSound();
    state.selectedCardIdx = null;
    renderBattle();
  });

  $('#btn-end-turn').addEventListener('click', () => { playClickSound(); endTurn(); });
  $('#btn-to-album').addEventListener('click', () => { playClickSound(); runTransition('album'); });
  $('#btn-retry').addEventListener('click', () => { playClickSound(); startBattle(); });
  $('#btn-restart-demo').addEventListener('click', () => {
    playClickSound();
    state.collection = new Set(['spade3','heart5','diamond2','club4']);
    showScreen('screen-title');
  });

})();
</script>
</body>
</html>
