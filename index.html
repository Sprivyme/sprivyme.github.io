<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FATE - 命运卡牌</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #ffffff;
            color: #111111;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }
        .title {
            font-size: 48px;
            font-weight: 700;
            letter-spacing: 8px;
            margin-bottom: 8px;
            color: #000000;
        }
        .subtitle {
            font-size: 14px;
            color: #888888;
            letter-spacing: 2px;
            margin-bottom: 60px;
        }
        .game-card {
            display: block;
            width: 100%;
            max-width: 400px;
            padding: 24px;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            text-decoration: none;
            color: inherit;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
            background: #ffffff;
        }
        .game-card:hover {
            border-color: #000000;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        .game-card .game-name {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #000000;
        }
        .game-card .game-desc {
            font-size: 14px;
            color: #666666;
            line-height: 1.6;
        }
        .game-card .game-tag {
            display: inline-block;
            margin-top: 12px;
            padding: 4px 10px;
            font-size: 12px;
            border: 1px solid #000000;
            border-radius: 4px;
            color: #000000;
        }
        footer {
            margin-top: 80px;
            font-size: 12px;
            color: #aaaaaa;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="title">FATE</div>
    <div class="subtitle">命运卡牌对战游戏</div>

    <a href="game.html" class="game-card">
        <div class="game-name">命运 FATE</div>
        <div class="game-desc">
            一款复古像素风格的卡牌对战游戏。选择你的英雄，召唤生物与法术，与AI展开激烈对决。
            包含人机模式、锦标赛、屠龙模式和速战速决四种玩法。
        </div>
        <span class="game-tag">点击开始游戏</span>
    </a>

    <footer>sprivyme.github.io</footer>
</body>
</html>
